<style>
:root {
--bg: #0a0c10;
--surface: #0f1318;
--surface2: #151b24;
--surface3: #1c2535;

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
body::before { content: ''; position: fixed; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,194,255,0.012) 2px, rgba(0,194,255,0.012) 4px); pointer-events: none; z-index: 9999; }

header { display: flex; align-items: center; justify-content: space-between; padding: 14px 32px; background: rgba(10,12,16,0.95); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
.header-left { display: flex; align-items: center; gap: 20px; }
.back-link { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text-dim); text-decoration: none; letter-spacing: 1px; transition: color 0.15s; }
.back-link:hover { color: var(--accent); }
.logo { display: flex; align-items: center; gap: 12px; }
.logo-shield { width: 36px; height: 36px; }
.logo-shield svg { width: 100%; height: 100%; }
.logo-text { font-family: 'Rajdhani', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: 2px; color: var(--text); }
.logo-text span { color: var(--accent); }
.header-meta { display: flex; align-items: center; gap: 20px; }
.badge { font-family: 'IBM Plex Mono', monospace; font-size: 10px; padding: 3px 10px; border-radius: 2px; letter-spacing: 1px; text-transform: uppercase; }
.badge-ai { background: rgba(0,194,255,0.1); color: var(--accent); border: 1px solid rgba(0,194,255,0.3); }
.badge-secure { background: rgba(0,229,160,0.1); color: var(--green); border: 1px solid rgba(0,229,160,0.3); }
.officer-info { font-size: 12px; color: var(--text-dim); font-family: 'IBM Plex Mono', monospace; }

.app { display: grid; grid-template-columns: 260px 1fr 320px; min-height: calc(100vh - 24 36v8"/>

<path d="M36 24h8"/>
<circle cx="24" cy="24" r="12"/>

<h3>AI Narrative Generation</h3>
<p>Powered by Anthropic's Claude AI. Produces a professional, third-person, past-tense law enforcement narrative using only the facts the officer provides. No speculation. No fabrication. Court-ready output.</p>
</div>

<div class="feature-card">
<svg class="feature-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5">

<h3>Built-In Audit Trail</h3>
<p>Every action is timestamped and logged: session start, generation events, officer edits, copy actions, and final submission. Full chain-of-custody for the report writing process.</p>
</div>

<div class="feature-card">
<svg class="feature-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5">

<h3>Officer Verification Checkpoint</h3>
<p>Before submission, officers must check off five mandatory review items confirming accuracy, factual integrity, and personal accountability. The submit button only activates when all boxes are cleared.</p>
</div>

<div class="feature-card">
<svg class="feature-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5">
<rect x="6" y="6" width="36" height="36" rx="2"/>

<h3>AI Disclosure Notice</h3>
<p>Every generated narrative is accompanied by a mandatory disclosure banner: the AI's role is transparent, and the officer's review and certification is required before submission.</p>
</div>

<div class="feature-card">
<svg class="feature-icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5">
<rect x="8" y="12" width="32" height="24" rx="2"/>
<path d="M8 20h32"/>
<path d="M20 36v4"/>
<path d="M28 36v4"/>

<h3>Hardware-Agnostic</h3>
<p>Runs in any modern browser. No app install, no proprietary hardware, no vendor lock-in. Works on department computers, MDTs, and personal devices.</p>
</div>

<!-- Contact Section -->
<section class="contact" id="contact">

<div class="contact-card">
<div class="section-label">Request Department Access</div>

<h2>Bring ReportShield to Your Department</h2>

<p>ReportShield is currently available for Mississippi law enforcement departments. Request access to get your unit set up with AI-assisted report writing — no contracts, no hardware requirements.</p>

<form id="accessForm">
<div class="form-group">
<label>Department / Agency Name</label>
<input type="text" required placeholder="e.g., Jackson Police Department">
</div>

<div class="form-row">
<div class="form-group">
<label>Your Name & Rank</label>
<input type="text" required placeholder="e.g., Sgt. John Miller">
</div>
<div class="form-group">
<label>Email Address</label>
<input type="email" required placeholder="name@department.gov">
</div>
</div>

<div class="form-row">
<div class="form-group">
<label>County / City</label>
<input type="text" required placeholder="e.g., Hinds County">
</div>
<div class="form-group">
<label>Approximate Number of Officers</label>
<select required>
<option value="">Select range...</option>
<option value="1-10">1-10</option>
<option value="11-25">11-25</option>
<option value="26-50">26-50</option>
<option value="51-100">51-100</option>
<option value="101-250">101-250</option>
<option value="250+">250+</option>
</select>
</div>
</div>

<div class="form-group">
<label>Tell us about your current report writing process</label>
<textarea placeholder="What challenges does your department face with report writing? What systems are you currently using?"></textarea>
</div>

<button type="submit" class="btn btn-primary submit-btn">Submit Request</button>
</form>

<div class="disclosure-bar">
ReportShield is an officer-built platform. All AI output requires officer review and certification before submission.
</div>
</div>
</div>
</section>

<script>
// Form submission handler
document.getElementById('accessForm').addEventListener('submit', function(e) {
e.preventDefault();
alert("Request submitted! We'll be in touch.");
this.reset();
});

// Smooth scroll for anchor links
document.querySelectorAll('a[href^="#"]').forEach(anchor => {
anchor.addEventListener('click', function (e) {
e.preventDefault();
const target = document.querySelector(this.getAttribute('href'));
if (target) {
target.scrollIntoView({
behavior: 'smooth',
block: 'start'
});
}
});
});
</script>
